name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check changesets on PR
        if: github.event_name == 'pull_request'
        run: bunx changeset status --since=origin/${{ github.base_ref }}

      - name: Detect extension changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            extension:
              - 'apps/extension/**'
              - 'packages/core/**'

      - name: Install Playwright Browsers
        if: github.event_name == 'push' || steps.filter.outputs.extension == 'true'
        run: bunx playwright install --with-deps

      - name: Run validation and build
        run: bun run check && bun run build

      - name: Upload Extension Artifacts
        if: github.event_name == 'push' || steps.filter.outputs.extension == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: yt-dedupe-extension
          path: apps/extension/dist/*.zip
