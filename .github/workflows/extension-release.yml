name: Extension Release

on:
  push:
    tags:
      - "extension-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Extension version to release. Defaults to manifest.config.ts version."
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Release Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release version
        id: version
        run: |
          MANIFEST_VERSION=$(sed -nE 's/^[[:space:]]*version:[[:space:]]*"([^"]+)".*/\1/p' apps/extension/manifest.config.ts | head -n 1)
          if [ -z "$MANIFEST_VERSION" ]; then
            echo "::error::Could not read extension version from apps/extension/manifest.config.ts"
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#extension-v}"
          else
            RELEASE_VERSION="${{ github.event.inputs.version || '' }}"
            RELEASE_VERSION="${RELEASE_VERSION:-$MANIFEST_VERSION}"
          fi

          if [ "$RELEASE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Release version ($RELEASE_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=extension-v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version validated: $RELEASE_VERSION"

      - name: Quality gate
        run: bun run --filter extension check

      - name: Build extension
        run: bun run --filter extension build

      - name: Verify build artifacts
        run: |
          for zip in yt-dedupe-chrome.zip yt-dedupe-firefox.zip; do
            if [ ! -f "apps/extension/dist/$zip" ]; then
              echo "::error::Expected build artifact apps/extension/dist/$zip not found"
              exit 1
            fi
          done
          echo "All build artifacts verified"

      - name: Generate SHA256 checksums
        working-directory: apps/extension/dist
        run: sha256sum yt-dedupe-chrome.zip yt-dedupe-firefox.zip > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Extension ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            apps/extension/dist/yt-dedupe-chrome.zip
            apps/extension/dist/yt-dedupe-firefox.zip
            apps/extension/dist/checksums-sha256.txt
